<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workout Log — Dashboard</title>
<style>
:root{--bg:#0e1116;--panel:#171c24;--muted:#9ca8b8;--text:#f3f6fa;--accent:#79d7b1;--line:#293241}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 system-ui}main{max-width:1060px;margin:auto;padding:44px 20px 64px}.grid{display:grid;gap:16px;grid-template-columns:repeat(4,1fr)}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}.wide{grid-column:span 2}.value{font-size:2rem;font-weight:750}.label{color:var(--muted);font-size:.9rem}h1{margin:.2em 0}.lead,.muted{color:var(--muted)}table{width:100%;border-collapse:collapse}td{padding:10px 0;border-top:1px solid var(--line)}td:last-child{text-align:right;color:var(--muted)}.quote-reminder{margin-top:30px;padding:18px 42px 0 0;border-top:1px solid var(--line);color:var(--muted);opacity:.82;position:relative}.quote-refresh{position:absolute;right:0;top:14px;background:none;border:0;color:var(--muted)}.quote-text{font-size:.86rem;white-space:pre-line}@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}.wide{grid-column:span 2}}
</style>
</head>
<body><main>
<h1>Тренировочный дашборд</h1><p class="lead">Тренировки, активность и восстановление.</p>
<section class="grid" id="dashboard">Загрузка...</section>
<section class="quote-reminder"><button class="quote-refresh" id="quote-refresh">↻</button><p class="quote-text" id="quote-text">Загрузка...</p><div id="quote-source"></div></section>
</main>
<script>
let quotes=[],qi=-1;
function quote(){if(!quotes.length)return;let n=Math.floor(Math.random()*quotes.length);if(n===qi)n=(n+1)%quotes.length;qi=n;document.querySelector('#quote-text').textContent=quotes[n].text;document.querySelector('#quote-source').textContent=quotes[n].source}
fetch('../data/quotes.json').then(r=>r.json()).then(d=>{quotes=d.quotes||[];quote();document.querySelector('#quote-refresh').onclick=quote});
Promise.all([fetch('../data/workouts.json').then(r=>r.json()),fetch('../data/activity.json').then(r=>r.json())]).then(([wd,ad])=>{
let w=wd.workouts||[],a=ad.activities||[],root=document.querySelector('#dashboard');let last=w.sort((x,y)=>y.date.localeCompare(x.date))[0];let act=a.sort((x,y)=>y.date.localeCompare(x.date))[0];
root.innerHTML=`<article class="card"><div class="value">${w.length}</div><div class="label">тренировок</div></article><article class="card"><div class="value">${last.date}</div><div class="label">последняя тренировка</div></article><article class="card"><div class="value">${act?act.durationMinutes+' мин':'—'}</div><div class="label">последняя активность</div></article><article class="card"><div class="value">${act?'❤️ '+act.averageHeartRate:'—'}</div><div class="label">средний пульс активности</div></article><article class="card wide"><h2>Последняя тренировка</h2><table>${last.exercises.slice(0,6).map(e=>`<tr><td>${e.name}</td><td>${e.load} ${e.reps}</td></tr>`).join('')}</table></article><article class="card wide"><h2>Активность</h2><table><tr><td>${act.type}</td><td>${act.durationMinutes} мин · ${act.caloriesKcal} ккал</td></tr><tr><td>Пульс</td><td>${act.averageHeartRate}/${act.maximumHeartRate}</td></tr><tr><td>Восстановление</td><td>${act.recoveryEstimateHours} ч</td></tr></table></article>`;
});
</script></body></html>
